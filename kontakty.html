<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - TravelSite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html"><i class="fas fa-globe"></i> TravelSite</a>
            </div>
            <nav class="nav" id="nav">
                <ul class="nav-list">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="goryachie-putevki.html">Горящие путевки</a></li>
                    <li><a href="oteli.html">Отели</a></li>
                    <li><a href="strany.html">Страны</a></li>
                    <li><a href="o-nas.html">О нас</a></li>
                    <li><a href="kontakty.html" class="active">Контакты</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <button class="btn btn-outline" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Вход</button>
                <button class="btn btn-primary" id="registerBtn"><i class="fas fa-user-plus"></i> Регистрация</button>
            </div>
            <button class="burger" id="burger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <h1>Контакты</h1>
                <p>Свяжитесь с нами любым удобным способом</p>
            </div>
        </section>

        <section class="contact">
            <div class="container contact-container">
                <div class="contact-info">
                    <h2>Наши контакты</h2>
                    <p><i class="fas fa-map-marker-alt"></i> г. Москва, ул. Пушкина, д. 10</p>
                    <p><i class="fas fa-phone"></i> +7 (999) 123-45-67</p>
                    <p><i class="fas fa-envelope"></i> info@travelsite.ru</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-telegram"></i></a>
                    </div>
                </div>
                <form class="contact-form">
                    <h2>Напишите нам</h2>
                    <div class="form-group">
                        <input type="text" placeholder="Ваше имя">
                    </div>
                    <div class="form-group">
                        <input type="email" placeholder="Ваш email">
                    </div>
                    <div class="form-group">
                        <textarea placeholder="Сообщение"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-info">
                <p>&copy; 2025 TravelSite. Все права защищены.</p>
            </div>
            <div class="footer-social">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
    </footer>

    <!-- Модальное окно авторизации -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="tabs">
                <button class="tab-btn active" id="loginTab">Вход</button>
                <button class="tab-btn" id="registerTab">Регистрация</button>
            </div>
            <div class="tab-content active" id="loginForm">
                <form>
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="Введите email">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Пароль</label>
                        <input type="password" id="loginPassword" placeholder="Введите пароль">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Войти</button>
                </form>
            </div>
            <div class="tab-content" id="registerForm">
                <form>
                    <div class="form-group">
                        <label for="regName">Имя</label>
                        <input type="text" id="regName" placeholder="Введите имя">
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="Введите email">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Пароль</label>
                        <input type="password" id="regPassword" placeholder="Введите пароль">
                    </div>
                    <div class="form-group">
                        <label for="regConfirm">Подтвердите пароль</label>
                        <input type="password" id="regConfirm" placeholder="Повторите пароль">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
